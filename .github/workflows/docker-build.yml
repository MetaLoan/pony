name: Build and Push Serverless Worker

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像 Tag（例如：v1.0.0 或 latest）'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (Lightweight - models on Network Volume)
        uses: docker/build-push-action@v5
        with:
          context: ./serverless_build
          file: ./serverless_build/Dockerfile.lightweight
          push: true
          tags: lrrrrrrrr/runpod-pulid-serverless-${{ github.event.inputs.image_tag }}
