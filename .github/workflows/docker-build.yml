name: Build and Push Serverless Worker

on:
  workflow_dispatch: # This makes it so you have to click a button to run it manually

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # VERY IMPORTANT: GitHub standard runners only have ~14GB free space. 
      # Our ComfyUI image is 20GB. We MUST flush out Android/DotNet/Haskell tools to scrape up 30GB of space.
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./serverless_build
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/runpod-pulid-serverless:v15.${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/runpod-pulid-serverless:latest
